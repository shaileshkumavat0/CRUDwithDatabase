<!DOCTYPE html>
<html>
<head>
<title>Students List</title>
</head>

<body>

<h2>Students List</h2>

<table border="1" cellpadding="10">

<tr>
<th>Roll No</th>
<th>Name</th>
<th>Age</th>
<th>Marks</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>
<td>{{ s.roll_no }}</td>
<td>{{ s.name }}</td>
<td>{{ s.age }}</td>
<td>{{ s.marks }}</td>

<td>
<a href="/delete/{{ s.roll_no }}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Add New Student</a>

</body>
</html>
