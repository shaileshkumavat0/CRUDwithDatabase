<!DOCTYPE html>
<html>
<head>
<title>Students List</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:80%;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#333;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f5f5f5;
}

.btn-edit{
    padding:6px 12px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.btn-delete{
    padding:6px 12px;
    background:#dc3545;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.btn-add{
    display:inline-block;
    margin-bottom:20px;
    padding:8px 15px;
    background:#28a745;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Students List</h2>

<a href="/" class="btn-add">+ Add New Student</a>

<table>

<tr>
<th>Roll No</th>
<th>Name</th>
<th>Age</th>
<th>Marks</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>

<td>{{ s.roll_no }}</td>
<td>{{ s.name }}</td>
<td>{{ s.age }}</td>
<td>{{ s.marks }}</td>

<td>
<a href="/edit/{{ s.roll_no }}" class="btn-edit">Edit</a>
<a href="/delete/{{ s.roll_no }}" class="btn-delete">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
